name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  ci-v2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            BlazorShop.PresentationV2/BlazorShop.ControlPlane.Web/package-lock.json
            BlazorShop.PresentationV2/BlazorShop.Storefront.V2/package-lock.json

      - name: Restore
        run: dotnet restore BlazorShop.V2.slnf

      - name: Build
        run: dotnet build BlazorShop.V2.slnf --configuration Release --no-restore

      - name: Test
        run: dotnet test BlazorShop.Tests.V2/BlazorShop.Tests.V2.csproj --configuration Release --no-build --verbosity normal

      - name: Validate V2 production compose config
        env:
          BLAZORSHOP_CONTROLPLANE_DB_PASSWORD: ci-controlplane-db-password
          BLAZORSHOP_COMMERCENODE_DB_PASSWORD: ci-commercenode-db-password
          BLAZORSHOP_CONTROLPLANE_JWT_KEY: ci-controlplane-jwt-signing-key-which-is-long-enough
          BLAZORSHOP_COMMERCENODE_JWT_KEY: ci-commercenode-jwt-signing-key-which-is-long-enough
          BLAZORSHOP_CONTROLPLANE_API_BASE_URL: https://controlplane-api.shop.example.com
          BLAZORSHOP_CONTROLPLANE_WEB_BASE_URL: https://controlplane.shop.example.com
          BLAZORSHOP_COMMERCENODE_API_BASE_URL: https://commerce-node.shop.example.com
          BLAZORSHOP_COMMERCENODE_NODE_KEY: ci-node
          BLAZORSHOP_COMMERCENODE_NODE_SECRET: ci-node-secret-which-is-long-enough
          BLAZORSHOP_STOREFRONT_BASE_URL: https://shop.example.com
          BLAZORSHOP_STOREFRONT_STORE_KEY: default
        run: docker compose -f compose.v2.production.yml config

      - name: Build Commerce Node API V2 container image
        run: docker build -f BlazorShop.PresentationV2/BlazorShop.CommerceNode.API/Dockerfile -t blazorshop-commercenode-api:v2-ci .

      - name: Build Control Plane API V2 container image
        run: docker build -f BlazorShop.PresentationV2/BlazorShop.ControlPlane.API/Dockerfile -t blazorshop-controlplane-api:v2-ci .

      - name: Build Control Plane Web V2 container image
        run: docker build -f BlazorShop.PresentationV2/BlazorShop.ControlPlane.Web/Dockerfile -t blazorshop-controlplane-web:v2-ci .

      - name: Build Storefront V2 container image
        run: docker build -f BlazorShop.PresentationV2/BlazorShop.Storefront.V2/Dockerfile -t blazorshop-storefront-v2:ci .

  legacy-compatibility:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: BlazorShop.Presentation/BlazorShop.Web/package-lock.json

      - name: Restore legacy solution
        run: dotnet restore BlazorShop.sln

      - name: Build legacy solution
        run: dotnet build BlazorShop.sln --configuration Release --no-restore

      - name: Test legacy suite
        run: dotnet test BlazorShop.Tests/BlazorShop.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Validate production compose config
        env:
          BLAZORSHOP_DB_PASSWORD: ci-db-password
          BLAZORSHOP_JWT_KEY: ci-jwt-signing-key-which-is-long-enough
          BLAZORSHOP_STRIPE_SECRET_KEY: sk_test_placeholder
          BLAZORSHOP_API_BASE_URL: https://api.shop.example.com
          BLAZORSHOP_CLIENT_APP_BASE_URL: https://account.shop.example.com
          BLAZORSHOP_STOREFRONT_BASE_URL: https://shop.example.com
          BLAZORSHOP_EMAIL_FROM: shop@example.com
          BLAZORSHOP_EMAIL_SMTP_SERVER: smtp.example.com
          BLAZORSHOP_EMAIL_USERNAME: ci@example.com
          BLAZORSHOP_EMAIL_PASSWORD: ci-email-password
        run: docker compose -f compose.production.yml config

      - name: Build API container image
        run: docker build -f BlazorShop.Presentation/BlazorShop.API/Dockerfile -t blazorshop-api:ci .

      - name: Build Storefront container image
        run: docker build -f BlazorShop.Presentation/BlazorShop.Storefront/Dockerfile -t blazorshop-storefront:ci .

      - name: Build Web container image
        run: docker build -f BlazorShop.Presentation/BlazorShop.Web/Dockerfile -t blazorshop-web:ci .
