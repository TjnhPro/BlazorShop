contractVersion: 1
starterVersion: 1.0.0-local
targetFramework: net10.0
generatedProject:
  namingConvention: BlazorShop.Storefront.{Name}
  outputRoot: BlazorShop.PresentationV2
  safeNamePattern: ^[A-Z][A-Za-z0-9]*$
packageDependencies:
  - id: BlazorShop.Storefront.Client
    versionProperty: StorefrontClientPackageVersion
  - id: BlazorShop.Storefront.Runtime
    versionProperty: StorefrontRuntimePackageVersion
allowedGeneratedZones:
  - Components/Layout
  - Components/Catalog
  - Components/Commerce
  - Components/Account
  - Components/States
  - Pages/Ssr
  - Pages/Hybrid
  - Pages/WasmHost
  - wwwroot/css
  - wwwroot/assets/generated
managedZones:
  - Features/feature-manifest.json
  - docs/storefront-analysis
protectedZones:
  - BlazorShop.Storefront.Client/Generated
  - BlazorShop.Storefront.Runtime
  - Endpoints/StarterBffEndpoints.cs
  - Security/StarterReturnUrlValidator.cs
  - StorefrontPackageVersions.props
  - starter-generation.contract.yaml
  - docs/storefront-analysis/generated-files.yaml
assetZones:
  - wwwroot/assets/generated
analysisArtifactZone: docs/storefront-analysis
featureManifest: Features/feature-manifest.json
hydrationModes:
  - InitialSnapshot
  - BrowserFetch
  - RefreshAfterHydration
requiredBffActions:
  - cart.add-line
  - cart.update-line
  - cart.remove-line
buildCommands:
  - dotnet restore BlazorShop.PresentationV2/BlazorShop.Storefront.{Name}/BlazorShop.Storefront.{Name}.csproj
  - dotnet build BlazorShop.PresentationV2/BlazorShop.Storefront.{Name}/BlazorShop.Storefront.{Name}.csproj --no-restore
gateCommands:
  - ./scripts/qa/run-storefront-starter-isolation-gate.ps1
  - ./scripts/qa/run-storefront-sample-release-gate.ps1
slots:
  - id: layout.header
    owner: generated
    path: Components/Layout/MainLayout.razor
  - id: layout.footer
    owner: generated
    path: Components/Layout/MainLayout.razor
  - id: layout.main-navigation
    owner: generated
    path: Components/Layout/MainLayout.razor
  - id: layout.mobile-navigation
    owner: generated
    path: Components/Layout/MainLayout.razor
  - id: layout.cart-badge
    owner: generated
    path: Components/Layout/MainLayout.razor
  - id: layout.account-menu
    owner: generated
    path: Components/Layout/MainLayout.razor
  - id: home.sections
    owner: generated
    path: Pages/Ssr/Home/HomePage.razor
  - id: catalog.product-card
    owner: generated
    path: Components/Catalog/ProductSummaryCard.razor
  - id: catalog.filters
    owner: generated
    path: Pages/Hybrid/Catalog/CategoryPage.razor
  - id: catalog.sorting
    owner: generated
    path: Pages/Hybrid/Catalog/CategoryPage.razor
  - id: catalog.pagination
    owner: generated
    path: Pages/Hybrid/Catalog/CategoryPage.razor
  - id: product.gallery
    owner: generated
    path: Components/Catalog/ProductGalleryPlaceholder.razor
  - id: product.information
    owner: generated
    path: Components/Catalog/ProductDetailShell.razor
  - id: product.purchase
    owner: generated
    path: Components/Catalog/PurchasePanelPlaceholder.razor
    action: cart.add-line
  - id: cart.page
    owner: managed
    path: Pages/Hybrid/Commerce/CartPage.razor
  - id: checkout.page
    owner: managed
    path: Pages/Hybrid/Commerce/CheckoutPage.razor
  - id: account.shell
    owner: managed
    path: Pages/WasmHost/Account/AccountHostPage.razor
  - id: system.error
    owner: managed
    path: Components/States/ErrorState.razor
routes:
  - route: /
    path: Pages/Ssr/Home/HomePage.razor
    renderOwner: SSR
    hydrationMode: InitialSnapshot
  - route: /content/{Slug}
    path: Pages/Ssr/Content/ContentPage.razor
    renderOwner: SSR
    hydrationMode: InitialSnapshot
  - route: /signin
    path: Pages/Ssr/Auth/AuthShellPage.razor
    renderOwner: SSR
    hydrationMode: InitialSnapshot
  - route: /maintenance
    path: Pages/Ssr/System/MaintenancePage.razor
    renderOwner: SSR
    hydrationMode: InitialSnapshot
  - route: /not-found
    path: Pages/Ssr/System/NotFoundPage.razor
    renderOwner: SSR
    hydrationMode: InitialSnapshot
  - route: /category/{Slug}
    path: Pages/Hybrid/Catalog/CategoryPage.razor
    renderOwner: Hybrid
    hydrationMode: InitialSnapshot
  - route: /product/{Slug}
    path: Pages/Hybrid/Catalog/ProductPage.razor
    renderOwner: Hybrid
    hydrationMode: InitialSnapshot
  - route: /search
    path: Pages/Hybrid/Catalog/SearchPage.razor
    renderOwner: Hybrid
    hydrationMode: BrowserFetch
  - route: /cart
    path: Pages/Hybrid/Commerce/CartPage.razor
    renderOwner: Hybrid
    hydrationMode: BrowserFetch
  - route: /checkout
    path: Pages/Hybrid/Commerce/CheckoutPage.razor
    renderOwner: Hybrid
    hydrationMode: BrowserFetch
  - route: /payment/result
    path: Pages/Hybrid/Commerce/PaymentResultPage.razor
    renderOwner: Hybrid
    hydrationMode: RefreshAfterHydration
  - route: /deals
    path: Pages/Hybrid/Commerce/DealsPage.razor
    renderOwner: Hybrid
    hydrationMode: BrowserFetch
  - route: /account
    path: Pages/WasmHost/Account/AccountHostPage.razor
    renderOwner: WASM-host
    hydrationMode: BrowserFetch
