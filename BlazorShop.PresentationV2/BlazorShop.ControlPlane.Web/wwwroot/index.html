<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlazorShop Control Plane</title>
    <base href="/" />
    <link rel="stylesheet" href="vendor/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="css/site.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="grid min-h-screen place-items-center bg-ink-50 text-ink-700">
            <div class="text-center">
                <div class="mx-auto mb-4 grid size-12 place-items-center rounded-md border border-ink-200 bg-white shadow-sm">
                    <i class="fa-solid fa-network-wired" aria-hidden="true"></i>
                </div>
                <div class="text-sm font-semibold">Loading Control Plane</div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">x</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/downloads.js"></script>
</body>

</html>
