services:
  commercenode-postgres:
    image: postgres:17-alpine
    container_name: blazorshop-commercenode-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: blazorshop_commerce_node
      POSTGRES_USER: blazorshop_commerce_node
      POSTGRES_PASSWORD: blazorshop_commerce_node_dev
    ports:
      - "5434:5432"
    volumes:
      - commercenode_postgres_data:/var/lib/postgresql/data
    networks:
      - blazorshop-commercenode
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U blazorshop_commerce_node -d blazorshop_commerce_node",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  commercenode-nginx:
    image: nginx:1.27-alpine
    container_name: blazorshop-commercenode-nginx
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./BlazorShop.PresentationV2/BlazorShop.CommerceNode.API/runtime/nginx/conf.d:/etc/nginx/conf.d
      - ./BlazorShop.PresentationV2/BlazorShop.CommerceNode.API/runtime/nginx/logs:/var/log/nginx
      - commercenode_nginx_cache:/var/cache/nginx
    networks:
      - blazorshop-commercenode
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 10s
      timeout: 5s
      retries: 5

  commercenode-imgproxy:
    image: darthsim/imgproxy:v3
    container_name: blazorshop-commercenode-imgproxy
    restart: unless-stopped
    environment:
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /var/blazorshop/media
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_AUTO_WEBP: "true"
    ports:
      - "8089:8080"
    volumes:
      - ./BlazorShop.PresentationV2/BlazorShop.CommerceNode.API/runtime/media:/var/blazorshop/media:ro
    networks:
      - blazorshop-commercenode

  commercenode-mailpit:
    image: axllent/mailpit:v1.20
    container_name: blazorshop-commercenode-mailpit
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: "5000"
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - blazorshop-commercenode

volumes:
  commercenode_postgres_data:
  commercenode_nginx_cache:

networks:
  blazorshop-commercenode:
    name: blazorshop-commercenode
